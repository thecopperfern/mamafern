featuredEyebrow: Welcome
featuredHeading: Hello from Mama Fern
featuredBody: >-
  We're so glad you're here. Mama Fern is more than a clothing brand — it's
  a community of families who value comfort, quality, and a little bit of
  fun in their everyday wear. Stay tuned for seasonal drop announcements,
  behind-the-scenes looks at our design process, and stories from the
  families who wear Mama Fern.
featuredMeta: Posted by the Mama Fern team — Feb 2026

valuesHeading: What Brings Us Together
values:
  - emoji: "\U0001F33F"
    title: Natural Living
