heroEyebrow: Our Story
heroTitle: About Mama Fern
heroSubtitle: >-
  Rooted in the Everyday, our organic cotton apparel is here to let every part
  of the family shine.
brandStoryHeading: What Is Mama Fern?
brandStoryParagraphs:
  - >-
    Mama Fern is a family apparel brand based in the Pennsylvania, specializing
    in  natural fabric clothing for families who value comfort, sustainability,
    and earthy aesthetics. We design coordinating family sets, kids' clothing
    and parent apparel for outdoor-loving, low-tox families.
  - >-
    The name "Mama Fern" represents everything we believe in — ferns are among
    the oldest plants on Earth, resilient and quietly beautiful. They thrive in
    shade and sun alike, grounded in the soil but always reaching toward the
    light. That's the spirit we bring to every piece of clothing we create:
    grounded, natural, and designed to last and grow with your family.
  - >-
    Every piece in our collection is made from natural materials — organic
    cotton certified to GOTS standards — chosen for breathability, softness, and
    durability. We use fabrics that meet OEKO-TEX Standard 100 Class I
    requirements, the strictest textile safety level, specifically designed for
    baby products. If ever a product does not meet these standards, it will be
    explicitly stated for clear communication.
  - >-
    Our customers are parents who care deeply about what touches their family's
    skin. Low-tox mamas who choose cloth diapers and organic snacks are our
    people! Outdoorsy dads who love a quality cotton tee and a Saturday morning
    round of disc golf. Families who believe that what they wear can reflect the
    same values they bring to everything else — natural living, outdoor
    adventure, and togetherness.
  - >-
    What makes Mama Fern different? We design coordinating family outfits — not
    identical matching sets, but complementary pieces in the same earthy
    palettes that nicely fit into capsule wardrobes. Sage greens, warm browns,
    dusty roses, and soft creams that work together beautifully while letting
    each family member express their own style. We produce in small batches with
    ethical manufacturing partners, use recycled packaging, and price our pieces
    so quality natural-fabric clothing is accessible to real families.
brandStoryBlockquote: Clothing that celebrates the grounded, low-tox life — for the whole crew.
missionEyebrow: Why We Exist
missionHeading: Our Mission
missionBody: >-
  We believe family moments deserve to be comfortable. That's why we use organic
  cotton in every piece, paired with earthy patterns and thoughtful designs that
  celebrate the grounded, low-tox life. Our goal is to make natural-fabric
  family clothing that's beautiful, accessible, and built to last through all
  the adventures — from playground mornings to campfire evenings.
valuesHeading: What We Stand For
values:
  - emoji: 🌱
    title: Skin-Friendly Fabrics
    description: >-
      Every piece is made from organic cotton — chosen for breathability,
      softness, and durability. We use OEKO-TEX Standard 100 Class I certified
      materials, the strictest safety level designed for baby products. If
      something doesn't meet these standards it will be explicitly, loudly
      stated.
  - emoji: ✨
    title: Intentional Drops
    description: >-
      We release small-batch seasonal collections rather than churning out fast
      fashion. Each drop is thoughtfully designed with coordinating palettes so
      families can mix, match, and grow together.
  - emoji: 👨‍👩‍👧‍👦
    title: Family Coordination
    description: >-
      Our collections feature matching color palettes and complementary designs
      across baby, kids, mom, and dad sizes — coordinating without being
      identical, so each family member shines.
  - emoji: 🎨
    title: Playful & Grounded
    description: >-
      Earth tones meet joyful patterns. Sage greens, warm browns, and dusty
      roses paired with playful designs that celebrate the cozy, grounded,
      nature-loving life.
brandFaqHeading: Frequently Asked About Mama Fern
brandFaqs:
  - question: What does "crunchy family apparel" mean?
    answer: >-
      To us, "Crunchy" describes families who lean toward low-tox natural living
      — organic food, home schooling, and sustainable choices. Crunchy family
      apparel extends those values into clothing: natural fabrics, earthy
      aesthetics, and intentional design over fast fashion.
  - question: What fabrics does Mama Fern use?
    answer: >-
      We primarily use organic cotton certified to GOTS standards, cotton-linen
      blends, and merino wool. All fabrics meet OEKO-TEX Standard 100 Class I
      requirements — the strictest textile safety level, specifically designed
      for baby products. If ever a product does not meet these standards, it is
      explicitly and boldly stated.
  - question: Does Mama Fern make matching family outfits?
    answer: >-
      Yes — matching family sets are at the heart of what we do. We design
      coordinating (not identical) pieces across baby, kids, mom, and dad sizes
      in complementary earth-tone palettes.
  - question: Where is Mama Fern based?
    answer: >-
      Mama Fern is designed in the Pennsylvania. Our products are crafted with
      ethical manufacturing partners who are personally vetted for fair labor
      practices and environmental responsibility. Our decoration team is a small
      family business, which holds a special place in our hearts as they embody
      our brand perfectly.
  - question: Is Mama Fern sustainable?
    answer: >-
      Sustainability is core to our mission. We use organic and natural fabrics,
      produce in small batches to minimize waste, use recycled packaging
      materials, and partner only with manufacturers who meet our environmental
      and labor standards.
ctaEyebrow: Dress the Whole Crew
