brandFaqHeading: Frequently Asked About Mama Fern
brandFaqs:
  - question: What does "crunchy family apparel" mean?
    answer: >-
      "Crunchy" describes families who lean toward natural living — organic
      food, gentle parenting, and eco-conscious choices. Crunchy family
      apparel extends those values into clothing: natural fabrics, earthy
      aesthetics, and intentional design over fast fashion.
  - question: What fabrics does Mama Fern use?
    answer: >-
      We primarily use organic cotton certified to GOTS standards,
      cotton-linen blends, and bamboo viscose. All fabrics meet OEKO-TEX
      Standard 100 Class I requirements — the strictest textile safety level,
      specifically designed for baby products.
  - question: Does Mama Fern make matching family outfits?
    answer: >-
      Yes — matching family sets are at the heart of what we do. We design
      coordinating (not identical) pieces across baby, kids, mom, and dad
      sizes in complementary earth-tone palettes.
  - question: Where is Mama Fern based?
    answer: >-
      Mama Fern is designed in the United States. Our products are crafted
      with ethical manufacturing partners who are personally vetted for fair
      labor practices and environmental responsibility.
  - question: Is Mama Fern sustainable?
    answer: >-
      Sustainability is core to our mission. We use organic and natural
      fabrics, produce in small batches to minimize waste, use recycled
      packaging materials, and partner only with manufacturers who meet our
      environmental and labor standards.

