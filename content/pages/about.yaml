heroEyebrow: Our Story
heroTitle: About Mama Fern
heroSubtitle: Grounded family apparel for crunchy, cozy homes.

brandStoryHeading: What Is Mama Fern?
brandStoryParagraphs:
  - >-
    Mama Fern is a family apparel brand based in the United States,
    specializing in natural-fabric clothing for families who value comfort,
    sustainability, and earthy aesthetics. We design matching family sets,
    kids' clothing, and parent apparel for outdoor-loving, crunchy,
    cottagecore-inspired families.
  - >-
    The name "Mama Fern" represents everything we believe in — ferns are
    among the oldest plants on Earth, resilient and quietly beautiful. They
    thrive in shade and sun alike, grounded in the soil but always reaching
    toward the light. That's the spirit we bring to every piece of clothing
    we create: grounded, natural, and designed to grow with your family.
  - >-
    Every piece in our collection is made from natural materials — organic
    cotton certified to GOTS standards, linen, and bamboo viscose — chosen
    for breathability, softness, and durability. We use fabrics that meet
    OEKO-TEX Standard 100 Class I requirements, the strictest textile safety
    level, specifically designed for baby products.
  - >-
    Our customers are parents who care deeply about what touches their
    family's skin. Crunchy moms who choose cloth diapers and organic snacks.
    Cottagecore dads who love a good henley and a Saturday morning hike.
    Families who believe that what they wear can reflect the same values they
    bring to everything else — natural living, outdoor adventure, and
    togetherness.
  - >-
    What makes Mama Fern different? We design coordinating family outfits —
    not identical matching sets, but complementary pieces in the same earthy
    palettes. Sage greens, warm browns, dusty roses, and soft creams that
    work together beautifully while letting each family member express their
    own style. We produce in small batches with ethical manufacturing
    partners, use recycled packaging, and price our pieces so quality
    natural-fabric clothing is accessible to real families.
brandStoryBlockquote: Clothing that celebrates the grounded, cozy life — for the whole crew.

missionEyebrow: Why We Exist
missionHeading: Our Mission
missionBody: >-
  We believe family moments deserve to be comfortable. That's why we use
  organic cotton and other natural materials in every piece, paired with
  earthy patterns and thoughtful designs that celebrate the grounded, cozy
  life. Our goal is to make natural-fabric family clothing that's beautiful,
  accessible, and built to last through all the adventures — from playground
  mornings to campfire evenings.

