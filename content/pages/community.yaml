  - emoji: "\U0001F468\u200D\U0001F469\u200D\U0001F467"
    title: Family First
    description: Every design starts with real families in mind — cozy, coordinating, and full of joy.
  - emoji: "\U0001F49A"
    title: Growing Together
    description: Your stories and feedback shape everything we make. This brand belongs to all of us.

